# ============================================
# 운영(Production) 프로필 설정
# 사용법: --spring.profiles.active=prod
# ============================================

spring:
  jpa:
    hibernate:
      # 운영에서는 스키마 자동 변경 차단 — Flyway가 관리
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        show_sql: false

  # 운영에서는 Flyway 활성화 (로컬은 application.yaml에서 false)
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

app:
  file:
    base-url: ${APP_FILE_BASE_URL}
  cookie:
    secure: true  # HTTPS 환경
  oauth2:
    success-redirect-uri: ${OAUTH2_SUCCESS_REDIRECT_URI}
    profile-setup-redirect-uri: ${OAUTH2_PROFILE_SETUP_REDIRECT_URI}

gcs:
  bucket-name: ${GCS_BUCKET_NAME}

# 운영 로그 레벨 (WARN 이상만)
logging:
  level:
    root: WARN
    com.zerozoa.psik: INFO
    org.hibernate.SQL: WARN

# Swagger UI 운영 비활성화
springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false