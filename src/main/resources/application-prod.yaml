spring:
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: false
        show_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

  security:
    oauth2:
      client:
        registration:
          google:
            redirect-uri: https://api.psik.kr/login/oauth2/code/google
          kakao:
            redirect-uri: https://api.psik.kr/login/oauth2/code/kakao

app:
  file:
    base-url: ${APP_FILE_BASE_URL}
  cookie:
    secure: true
  oauth2:
    success-redirect-uri: ${OAUTH2_SUCCESS_REDIRECT_URI}
    profile-setup-redirect-uri: ${OAUTH2_PROFILE_SETUP_REDIRECT_URI}

gcs:
  bucket-name: ${GCS_BUCKET_NAME}

logging:
  level:
    root: WARN
    com.zerozoa.psik: INFO
    org.hibernate.SQL: WARN

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false