spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 30MB

  application:
    name: skinner

  profiles:
    active: local

  # 데이터베이스 연결 설정
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  # JPA & Hibernate 설정
  jpa:
    open-in-view: false
    hibernate:
      # [주의] local 프로필에서만 update 사용
      # 운영 배포 시 application-prod.yaml에서 validate로 오버라이드됨
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        show_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  security:
    oauth2:
      client:
        # [1] 등록 (Registration): 카카오와 구글이 나란히 있어야 함
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - profile_nickname
              # - account_email (심사 전 주석 처리 잘하셨습니다)
            client-name: Kakao

          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            #redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - profile
              - email

        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

# JWT 설정
jwt:
  secret: ${JWT_SECRET}
  access-token-expiration-ms: ${JWT_ACCESS_TOKEN_EXPIRATION_MS}
  refresh-token-expiration-ms: ${JWT_REFRESH_TOKEN_EXPIRATION_MS}

app:
  file:
    upload-dir: uploads
    base-url: http://localhost:8080
  oauth2:
    # OAuth2 콜백 URI (소셜 로그인 인증 후 돌아올 URL)
    # redirect-uri: "skinner://callback"
    redirect-uri: "http://localhost:3000/callback.html"
    # 로그인 성공 후 프론트엔드 리다이렉트 URL
    success-redirect-uri: "http://localhost:3000/home"
  cookie:
    # 로컬 개발(http): false / 운영 배포(https): true
    secure: false

# 서버 포트 설정
server:
  port: ${SERVER_PORT}

# 로그 레벨 설정
logging:
  level:
    root: INFO
    org.hibernate.SQL: DEBUG

springdoc:
  querydsl:
    enabled: false
  swagger-ui:
    persist-authorization: true
  api-docs:
    path: /v3/api-docs
